</head>
<body class="text-white font-sans overflow-x-hidden min-h-screen flex flex-col pt-24">
    <!-- Navbar -->
    <nav id="main-nav" class="fixed w-full z-50 px-6 py-4 glass-navbar top-0 scrolled">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="index.html" id="nav-logo" class="text-3xl font-display font-black tracking-wider text-white neon-text-purple drop-shadow-xl">Mizora<span class="text-cyber-blue neon-text-blue">X</span></a>
            
            <div class="hidden lg:flex space-x-10 text-xs font-bold tracking-widest font-display">

            <button id="mobile-menu-btn" class="lg:hidden text-white focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>

        <div id="mobile-menu" class="hidden lg:hidden mt-4 flex flex-col space-y-4 p-6 premium-glass rounded-xl">
            <a href="index.html" class="block hover:text-cyber-blue font-display tracking-widest transition">HOME</a>
            <a href="anime.html" class="block hover:text-cyber-purple font-display tracking-widest transition">ANIME</a>
            <a href="movies.html" class="block hover:text-cyber-blue font-display tracking-widest transition">MOVIES</a>
            <a href="tv-series.html" class="block hover:text-cyber-purple font-display tracking-widest transition">TV SERIES</a>

    <main class="max-w-[1400px] mx-auto px-6 py-8 flex-grow w-full z-10 relative">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 border-b border-cyber-border pb-6">
            <div>
                <h1 class="text-4xl md:text-5xl font-display font-bold mb-2 neon-text-blue uppercase tracking-widest drop-shadow-[0_0_15px_rgba(0,243,255,0.3)]">Animation Vault</h1>
                <p class="text-gray-400 font-display text-xs tracking-widest mt-3 font-mono">WESTERN ANIMATION & MASTERPIECES</p>
            </div>
            <div class="mt-6 md:mt-0 w-full md:w-auto relative">
                <input type="text" id="category-search" placeholder="FILTER TITLES..." class="bg-black bg-opacity-60 border border-cyber-blue rounded-full px-6 py-3 w-full md:w-80 focus:border-cyber-purple focus:ring-1 focus:ring-cyber-purple outline-none transition font-display text-xs tracking-widest shadow-[0_0_10px_rgba(0,243,255,0.2)]">
                <svg class="w-5 h-5 absolute right-5 top-3 text-cyber-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
        
        <div id="movies-grid" class="premium-grid gap-y-12">
            <!-- Dynamic Injection -->
        </div>

        <div class="mt-16 text-center">
            <button id="load-more-btn" class="px-12 py-4 rounded-full font-bold font-display text-sm tracking-widest btn-neon-blue shadow-xl">
                LOAD MORE TITLES
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full p-8 md:p-12 border-t border-cyber-purple border-opacity-30 premium-glass mt-12 bg-black bg-opacity-80">
        <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <div id="footer-logo" class="text-4xl font-display font-black mb-2 text-white tracking-widest drop-shadow-[0_0_10px_rgba(176,38,255,0.5)]">Mizora<span class="text-cyber-blue">X</span></div>
                <p id="footer-about" class="text-gray-400 font-display text-xs tracking-widest uppercase mt-2 max-w-sm">PREMIUM STREAMING PLATFORM</p>
            </div>
            <div class="text-center">
                <div id="footer-credits" class="text-[10px] text-gray-500 font-mono tracking-widest uppercase mt-2">
                    Developed by:<br>
                    <span class="text-cyber-blue font-bold">Yasiru R. Wijewardhana</span> & <span class="text-cyber-purple font-bold">Dilshan Mudalige</span>
                </div>
            </div>
            <div class="flex space-x-6 text-xs font-display tracking-widest text-gray-400">
                <a href="#" class="hover:text-cyber-blue transition">Terms</a>
                <a href="#" class="hover:text-cyber-purple transition">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="js/movies.js"></script>
    <script src="js/app.js"></script>
    <script>
        window.initPage = () => {
            const fullData = movieService.getByCategory('Cartoons');
            let displayCount = 12;
            const grid = document.getElementById('movies-grid');
            const loadMoreBtn = document.getElementById('load-more-btn');

            const renderGrid = (data, limit) => {
                const toShow = data.slice(0, limit);
                if (toShow.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 font-display text-xl tracking-widest">No titles found.</div>`;
                    loadMoreBtn.classList.add('hidden');
                    return;
                }
                grid.innerHTML = toShow.map(m => createMovieCard(m)).join('');
                if (limit >= data.length) loadMoreBtn.classList.add('hidden');
                else loadMoreBtn.classList.remove('hidden');
            };

            renderGrid(fullData, displayCount);

            loadMoreBtn.addEventListener('click', () => {
                const prev = loadMoreBtn.innerText;
                loadMoreBtn.innerText = "LOADING...";
                setTimeout(() => {
                    displayCount += 6;
                    renderGrid(fullData, displayCount);
                    loadMoreBtn.innerText = prev;
                }, 600);
            });

            document.getElementById('category-search').addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                const filtered = fullData.filter(m => m.title.toLowerCase().includes(q));
                displayCount = 12;
                renderGrid(filtered, displayCount);
            });
        };
    </script>
</body>
</html>
