<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizoraX | Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-white font-sans overflow-x-hidden min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav id="main-nav" class="fixed w-full z-50 px-6 py-4 glass-navbar top-0">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="index.html" id="nav-logo" class="text-3xl font-display font-black tracking-wider text-white neon-text-purple drop-shadow-xl">Mizora<span class="text-cyber-blue neon-text-blue">X</span></a>
            
            <div class="hidden lg:flex space-x-10 text-xs font-bold tracking-widest font-display">
                <a href="index.html" class="hover:text-cyber-blue transition pb-1 text-gray-400">HOME</a>
                <a href="anime.html" class="hover:text-cyber-purple transition pb-1 text-gray-400">ANIME</a>
                <a href="movies.html" class="hover:text-cyber-blue transition pb-1 text-gray-400">MOVIES</a>
                <a href="tv-series.html" class="hover:text-cyber-purple transition pb-1 text-gray-400">TV SERIES</a>
                <a href="cartoons.html" class="hover:text-cyber-blue transition pb-1 text-gray-400">CARTOONS</a>
            </div>
        </div>
    </nav>

    <!-- Details Banner -->
    <div id="detail-banner" class="w-full h-[60vh] md:h-[75vh] bg-cover bg-center relative mt-0 bg-[#050508] transition-all duration-700">
        <div class="absolute inset-0 cinematic-gradient"></div>
        <div class="absolute inset-0 horizontal-gradient hidden md:block"></div>
        <div class="absolute inset-0 bg-black bg-opacity-20"></div>
    </div>
    
    <main class="max-w-[1400px] mx-auto px-6 relative -mt-40 md:-mt-64 pb-24 flex-grow w-full z-10">
        <div class="flex flex-col md:flex-row gap-8 md:gap-16">
            <!-- Poster -->
            <div class="w-2/3 mx-auto md:mx-0 md:w-1/3 lg:w-1/4 flex-shrink-0 group relative">
                <div class="relative rounded-2xl overflow-hidden shadow-[0_30px_50px_rgba(0,0,0,0.8)] border border-cyber-border premium-glass group-hover:border-cyber-blue transition-all duration-500 h-auto">
                    <img id="detail-poster" src="" class="w-full h-auto object-cover opacity-90 group-hover:opacity-100 transition duration-500 transform group-hover:scale-105">
                    
                    <a id="btn-play-poster" href="#" class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300 z-10 bg-black bg-opacity-50 backdrop-blur-sm">
                        <div class="w-20 h-20 rounded-full btn-neon-blue flex items-center justify-center transform scale-75 group-hover:scale-100 transition duration-300">
                           <svg class="w-10 h-10 ml-2 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                        </div>
                    </a>
                </div>
            </div>
            
            <!-- Details Info -->
            <div class="w-full md:w-2/3 lg:w-3/4 pt-4 md:pt-32">
                <div class="inline-block px-3 py-1 mb-4 text-xs font-bold font-display tracking-widest text-white border rounded bg-white bg-opacity-10 backdrop-blur-sm border-opacity-20" id="detail-type">
                    MOVIE
                </div>
                
                <h1 id="detail-title" class="text-4xl md:text-6xl lg:text-7xl font-display font-black mb-1 neon-text-blue text-white drop-shadow-xl leading-tight uppercase tracking-wider"></h1>


                <div class="flex flex-wrap items-center gap-6 mb-8 text-sm font-medium drop-shadow-md border-b border-cyber-border pb-8">
                    <span id="detail-year" class="text-gray-300 font-mono tracking-wider bg-black bg-opacity-50 px-3 py-1.5 rounded"></span>
                    <span id="detail-category" class="px-3 py-1.5 bg-cyber-purple bg-opacity-20 text-cyber-purple rounded border border-cyber-purple uppercase tracking-widest font-bold"></span>
                    <span class="flex items-center text-yellow-400 font-bold bg-black bg-opacity-50 px-3 py-1.5 rounded">
                        <svg class="w-5 h-5 mr-1.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg> 
                        <span id="detail-rating"></span>
                    </span>
                    <span class="text-gray-400 font-bold tracking-widest px-3 py-1.5 border border-gray-600 rounded">4K ULTRA HD</span>
                </div>
                
                <div class="max-w-4xl mb-12">
                    <h3 class="text-sm font-display font-bold mb-3 text-cyber-blue tracking-widest uppercase">SYNOPSIS</h3>
                    <p id="detail-desc" class="text-gray-300 text-lg leading-loose drop-shadow-md"></p>
                </div>
                
                <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6">
                    <a id="btn-play" href="#" class="px-10 py-4 rounded-full font-bold font-display btn-neon-blue flex justify-center items-center text-sm tracking-widest">
                        <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg> WATCH STREAM
                    </a>
                    <a id="btn-trailer" href="#" target="_blank" class="px-10 py-4 rounded-full font-bold font-display premium-glass hover:bg-white hover:bg-opacity-10 transition border border-white border-opacity-30 flex justify-center items-center text-sm tracking-widest">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> VIEW TRAILER
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Related / Similar -->
        <div class="mt-32">
            <h2 class="text-2xl font-display font-bold border-l-4 border-cyber-purple pl-4 text-white mb-8 tracking-widest uppercase">SIMILAR <span class="text-cyber-purple">TITLES</span></h2>
            <div id="related-grid" class="premium-grid gap-y-12">
                <!-- Injected via JS -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full p-8 md:p-12 border-t border-cyber-purple border-opacity-30 premium-glass mt-12 bg-black bg-opacity-80">
        <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <div id="footer-logo" class="text-4xl font-display font-black mb-2 text-white tracking-widest drop-shadow-[0_0_10px_rgba(176,38,255,0.5)]">Mizora<span class="text-cyber-blue">X</span></div>
                <p id="footer-about" class="text-gray-400 font-display text-xs tracking-widest uppercase mt-2 max-w-sm">PREMIUM STREAMING PLATFORM</p>
            </div>
            <div class="text-center">
                <div id="footer-credits" class="text-[10px] text-gray-500 font-mono tracking-widest uppercase mt-2">
                    Developed by:<br>
                    <span class="text-cyber-blue font-bold">Yasiru R. Wijewardhana</span> & <span class="text-cyber-purple font-bold">Dilshan Mudalige</span>
                </div>
            </div>
            <div class="flex space-x-6 text-xs font-display tracking-widest text-gray-400">
                <a href="#" class="hover:text-cyber-blue transition">Terms</a>
                <a href="#" class="hover:text-cyber-purple transition">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="js/movies.js"></script>
    <script src="js/app.js"></script>
    <script>
        window.initPage = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(id) {
                const m = movieService.getById(id);
                if(m) {
                    document.getElementById('detail-banner').style.backgroundImage = `url('${m.banner}')`;
                    document.getElementById('detail-poster').src = m.poster;
                    document.getElementById('detail-title').textContent = m.title;
                    document.getElementById('detail-year').textContent = m.year;
                    
                    const catEl = document.getElementById('detail-category');
                    catEl.textContent = m.category;
                    catEl.className = `px-3 py-1.5 rounded border uppercase tracking-widest font-bold ${getCategoryColors(m.category)}`;

                    document.getElementById('detail-rating').textContent = m.rating;
                    document.getElementById('detail-desc').textContent = m.description;
                    document.getElementById('detail-type').textContent = (m.type || 'MOVIE').toUpperCase();
                    
                    document.getElementById('btn-play').href = m.streamUrl && m.streamUrl !== '#' ? m.streamUrl : '#';
                    document.getElementById('btn-play').onclick = () => movieService.addToHistory(m.id);

                    document.getElementById('btn-play-poster').href = m.streamUrl && m.streamUrl !== '#' ? m.streamUrl : '#';
                    document.getElementById('btn-play-poster').onclick = () => movieService.addToHistory(m.id);

                    document.getElementById('btn-trailer').href = m.trailerUrl && m.trailerUrl !== '#' ? m.trailerUrl : '#';

                    document.title = "MizoraX | " + m.title;

                    // Related movies (same category)
                    let related = movieService.getByCategory(m.category).filter(rm => rm.id != m.id);
                    if(related.length === 0) related = movieService.getAll().filter(rm => rm.id != m.id);
                    document.getElementById('related-grid').innerHTML = related.slice(0, 6).map(rm => createMovieCard(rm)).join('');
                } else {
                    document.querySelector('main').innerHTML = '<div class="text-center py-40"><h1 class="text-6xl font-display font-black text-red-500 tracking-widest">ERROR 404</h1><p class="text-gray-400 mt-6 tracking-widest font-mono uppercase">Title not found in database.</p></div>';
                }
            } else {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
